name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# ─────────────────────────────────────────────
# Stage 1: Lint
# ─────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run flake8
        run: |
          flake8 . --max-line-length=120 --ignore=E501,W503 \
            --exclude=node_modules,__pycache__,.git,tests,\
            weather_temps_hourly_v2_openmeteo.py,\
            weather_trading_dual_source.py,\
            weather_trading_v3_1_with_realtime.py,\
            weather_trading_v4.py,\
            weather_trading_integration_v2.py,\
            weather_trading_integration_v3_with_ev.py,\
            box_office_*.py,accuracy_*.py,dragon_*.py,\
            hedge_*.py,btc5m_*.py,arbitrage*.py

      - name: Run black check
        run: |
          black --check --line-length=120 \
            --exclude='(node_modules|__pycache__|\.git|tests|weather_temps_hourly_v2_openmeteo\.py|weather_trading_dual_source\.py|weather_trading_v3_1_with_realtime\.py|weather_trading_v4\.py|weather_trading_integration_v2\.py|weather_trading_integration_v3_with_ev\.py|box_office_.*\.py|accuracy_.*\.py|dragon_.*\.py|hedge_.*\.py|btc5m_.*\.py|arbitrage.*\.py)' \
            .

# ─────────────────────────────────────────────
# Stage 2: Unit Tests
# ─────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/ --ignore=tests/e2e -v --tb=short

# ─────────────────────────────────────────────
# Stage 3: E2E Tests (main branch only)
# ─────────────────────────────────────────────
  e2e-test:
    name: E2E Browser Tests
    runs-on: ubuntu-latest
    needs: unit-test
    # Only run E2E on main branch pushes (not PRs to avoid double-run)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      HEADLESS: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js (for browser-use Chrome dependency)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Chrome browser
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-e2e-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-e2e-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install E2E test dependencies
        run: |
          pip install browser-use langchain-openai

      - name: Check browser-use doctor
        run: |
          python -c "from browser_use import Agent; print('browser-use OK')" || \
          echo "browser-use check completed"

      - name: Run E2E tests
        run: |
          pytest tests/e2e/ -v --tb=short -m e2e

# ─────────────────────────────────────────────
# Stage 4: Build Artifact
# ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    # Build on PRs and main pushes
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Create deployment artifact
        run: |
          mkdir -p dist
          zip -r dist/polymarket-${{ github.sha }}.zip . \
            --exclude="*.pyc" \
            --exclude="__pycache__/*" \
            --exclude=".git/*" \
            --exclude="node_modules/*" \
            --exclude=".venv/*" \
            --exclude="tests/*" \
            --exclude="*.log" \
            --exclude="*.db" \
            --exclude=".github/workflows/*" \
            --exclude="dist/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polymarket-build-${{ github.sha }}
          path: dist/polymarket-${{ github.sha }}.zip
          retention-days: 7

# ─────────────────────────────────────────────
# Stage 5: Deploy (manual trigger only)
# ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://clob.polymarket.com
    # Manual trigger only - never auto-deploy
    if: github.event_name == 'workflow_dispatch'
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: polymarket-build-${{ github.sha }}
          path: ./dist

      - name: List artifact
        run: |
          ls -la dist/

      - name: Deployment steps
        run: |
          echo "=== Deployment to ${{ github.event.inputs.environment || 'production' }} ==="
          echo "SHA: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo ""
          echo "TODO: Add your deployment steps here:"
          echo "  - rsync/scp to server"
          echo "  - Docker push to registry"
          echo "  - Kubernetes deployment"
          echo "  - PMXT relay server sync"
          echo ""
          echo "Required secrets (set in repo Settings > Secrets):"
          echo "  - AVWX_API_KEY"
          echo "  - POLYMARKET_API_KEY"
          echo "  - POLYMARKET_PRIVATE_KEY"
          echo "  - DEPLOY_HOST (server address)"
          echo "  - DEPLOY_USER (ssh user)"
          echo ""
          echo "For now: artifact is built and ready for manual deployment."

      - name: Create deployment record
        run: |
          mkdir -p deployment_logs
          echo "Deploy: ${{ github.sha }}" > deployment_logs/${{ github.run_id }}.txt
          echo "Environment: ${{ github.event.inputs.environment || 'production' }}" >> deployment_logs/${{ github.run_id }}.txt
          echo "Actor: ${{ github.actor }}" >> deployment_logs/${{ github.run_id }}.txt
          echo "Timestamp: $(date -u)" >> deployment_logs/${{ github.run_id }}.txt